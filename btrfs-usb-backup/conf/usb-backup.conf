

# ==============================================================================
# usb-backup.conf
# btrfs-usb-backup System Configuration File
#
# github.com/cygnick6/arch-linux-systems-design/btrfs-usb-backup
#
## MANUAL CONFIG NEEDED ##
# Manual configuration required at points marked with    ...    right-aligned ###
#
## EXECUTION CONTEXT ##
# This conf is sourced by:
# - usb-backup-now.sh
# - usb-backup-reminder.sh
# - usb-backup-status.sh
# - usb-backup-main.sh
# - usb-scrub-now.sh
# ==============================================================================

################################################################################
# TARGET USB BACKUP DRIVE
################################################################################

# UUID of the target Btrfs formatted USB device
# < REPLACE >                                                                ###
BACKUP_UUID=""

# Label of the target Btrfs formatted USB device
# < REPLACE IF NEEDED >                                                      ###
BACKUP_LABEL="btrfs-backup"

################################################################################
# USER CONFIG (send-notify)
################################################################################

# Username is only used by the optional implemented notifications

# < REPLACE >                                                                ###
USER_NAME=""

# USER_UID is automatically populated in scripts
# < LEAVE EMPTY >
USER_UID=""

# May ignore USER_NAME and USER_UID if using false
NOTIFY_USER=true

################################################################################
# SNAPSHOT RETENTION
################################################################################

# Max number of paired snapshots to store both locally and remotely
# Minimum values of 2 for incremental sends
MAX_ROOT_PAIRED_SNAPS=12
MAX_HOME_PAIRED_SNAPS=3

# Max number of unpaired snapshots to store both locally and remotely
# Unpaired snapshots may accumulate in extreme backup failure modes
# A minimum value of 1 allows protection against deleting the only available
#     parent snapshot
MAX_ROOT_UNPAIRED_SNAPS=2
MAX_HOME_UNPAIRED_SNAPS=1

PRUNE_PAIRED=true
PRUNE_UNPAIRED=true

################################################################################
# HOME RSYNC
################################################################################

# In the HOME_RSYNC_IGNORE_DIRS array, add directories that will be located
#     within /home, which will be within the newly created @home snapshot
# Exclusions are relative to snapshot root, not absolute paths

# Example:
#   HOME_RSYNC_IGNORE_DIRS=(
#       "Desktop"
#       "Pictures/wallpapers"
#       ".cache"
#   )

HOME_RSYNC_IGNORE_DIRS=(

)

# This recovery model may be used without the file-level /home rsync backup
# If set to false:
# - Existing /home rsync backup will not be deleted
# - DEST_HOME_RSYNC_DIR directory will be created but not (re)populated
HOME_RSYNC=true

################################################################################
# SCRUBBING
################################################################################

# This backup model runs a remote Btrfs scrub every N successful backups
SCRUB_INTERVAL=4

SCRUB=true

# (Manual) execution of usb-scrub-now.sh may reset the scrub-countdown
MANUAL_SCRUB_RESETS_COUNTDOWN=true

################################################################################
# LOGGING
################################################################################

# If LOG_TO_FILE=true, both journald and local log files are used for logging
# Use LOG_TO_FILE=false for only journald logging
LOG_TO_FILE=true

# If both LOG_TO_FILE=true and LOG_FILE_RECEIVE_DUMP=true, btrfs receive --dump
#     will be used when USB drive receives snapshots
# btrfs receive --dump will never be written to journald log
LOG_FILE_RECEIVE_DUMP=true

# If both LOG_TO_FILE=true and LOG_FILE_SCRUB_DUMP=true, btrfs scrub output will
#     be saved to SCRUB_DUMP_LOG_FILE
# btrfs scrub output will never be written to journald log
LOG_FILE_SCRUB_DUMP=true

# Default logrotate definitions may be configured in /etc/logrotate.d/usb-backup

################################################################################
# LOCAL FILE SYSTEM
################################################################################

# Local mountpoint
MOUNTPOINT="/mnt/btrfs-usb-backup"

# Local lock file
LOCK_DIR="/run/lock"
LOCK_FILE="$LOCK_DIR/usb-backup.lock"

# Local state directory
STATE_DIR="/var/lib/usb-backup"

# Local backup snapshot directories
LOCAL_SNAP_DIR="$STATE_DIR/local-snapshots"
LOCAL_ROOT_SNAP_DIR="$LOCAL_SNAP_DIR/root"
LOCAL_HOME_SNAP_DIR="$LOCAL_SNAP_DIR/home"

# Local state integer counter file locations
STATE_COUNTER_DIR="$STATE_DIR/counters"
BACKUP_SUCCESS_COUNT_FILE="$STATE_COUNTER_DIR/backup-success-count"
SCRUB_COUNTDOWN_FILE="$STATE_COUNTER_DIR/scrub-countdown"
SCRUB_SUCCESS_COUNT_FILE="$STATE_COUNTER_DIR/scrub-success-count"

# Local state flag file locations
STATE_FLAG_DIR="$STATE_DIR/flags"
BACKUP_DUE_FLAG="$STATE_FLAG_DIR/backup-due"
BACKUP_IN_PROGRESS_FLAG="$STATE_FLAG_DIR/backup-in-progress"
SCRUB_IN_PROGRESS_FLAG="$STATE_FLAG_DIR/scrub-in-progress"

# Local state timestamp file locations
STATE_TIMESTAMP_DIR="$STATE_DIR/timestamps"
FIRST_BACKUP_SUCCESS_TIMESTAMP_FILE="$STATE_TIMESTAMP_DIR/first-successful-backup"
LAST_BACKUP_ATTEMPT_TIMESTAMP_FILE="$STATE_TIMESTAMP_DIR/last-attempted-backup"
LAST_BACKUP_PROMPT_TIMESTAMP_FILE="$STATE_TIMESTAMP_DIR/last-prompted-backup"
LAST_BACKUP_SUCCESS_TIMESTAMP_FILE="$STATE_TIMESTAMP_DIR/last-successful-backup"
LAST_SCRUB_ATTEMPT_TIMESTAMP_FILE="$STATE_TIMESTAMP_DIR/last-attempted-scrub"
LAST_SCRUB_PROMPT_TIMESTAMP_FILE="$STATE_TIMESTAMP_DIR/last-prompted-scrub"
LAST_SCRUB_SUCCESS_TIMESTAMP_FILE="$STATE_TIMESTAMP_DIR/last-successful-scrub"

# Local state btrfs scrub results file
LAST_SCRUB_RESULT_FILE="$STATE_DIR/last-scrub-result"

# Local log files
LOG_DIR="/var/log/usb-backup"
LOG_FILE="$LOG_DIR/usb-backup.log"
ERROR_LOG_FILE="$LOG_DIR/usb-backup-error.log"
ROOT_RECEIVE_DUMP_LOG_FILE="$LOG_DIR/usb-backup-root-receive-dump.log"
HOME_RECEIVE_DUMP_LOG_FILE="$LOG_DIR/usb-backup-home-receive-dump.log"
SCRUB_DUMP_LOG_FILE="$LOG_DIR/usb-backup-scrub-dump.log"

################################################################################
# REMOTE FILE SYSTEM
################################################################################

# Remote backup directory
# Rename if storing multiple distinct system backups on target USB drive
# Consider including the system description, etc.
DEST_DIR="$MOUNTPOINT/arch-backups"

# Remote @ snapshot destination directories
DEST_ROOT_SNAP_DIR="$DEST_DIR/root"
DEST_ROOT_SNAP_STAGING_DIR="$DEST_ROOT_SNAP_DIR/.staging"

# Remote @home snapshot destination directories
DEST_HOME_SNAP_DIR="$DEST_DIR/home"
DEST_HOME_SNAP_STAGING_DIR="$DEST_HOME_SNAP_DIR/.staging"

# Remote file-level /home backup destination
DEST_HOME_RSYNC_DIR="$DEST_DIR/home-rsync"
DEST_HOME_RSYNC_STAGING_DIR="$DEST_DIR/.home-rsync-staging"
